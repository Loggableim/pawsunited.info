name: Live Status Collector
on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install websockets

      - name: Collect live status from Discord Gateway
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python scripts/live_status.py

      - name: Commit & push live status
        run: |
          git config user.name "PawsUnited Bot"
          git config user.email "bot@pawsunited.info"
          git add -A assets/data/live-status.json
          git diff --staged --quiet || (git commit -m "chore: update live status [skip ci]" && git push)
