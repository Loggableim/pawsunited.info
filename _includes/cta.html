{% assign c = site.data.content[page.lang] %}
{% assign cta = c.cta %}

<section class="cta-section">
  <div class="section-inner">
    <div class="section-label">▸ {{ cta.label }}</div>
    <h2 style="margin-bottom:0.75rem;">{{ cta.title_headline }} <span class="gradient-text">{{ cta.title_gradient }}</span></h2>
    <p style="color:var(--text2);max-width:480px;margin:0 auto 2rem;font-size:0.95rem;">{{ cta.subtitle }}</p>
    <a href="https://discord.gg/pawsunited" class="btn-neon btn-neon--pink" target="_blank">{{ cta.btn_text }}</a>
  </div>
</section>
