{% assign servers = site.data.servers %}
{% assign lang = page.lang | default: 'de' %}

<div class="server-carousel" id="serverCarousel">
  <div class="server-carousel__track" id="carouselTrack">
    {% for s in servers %}
    <div class="server-carousel__slide">
      <div class="server-card">
        <span class="tag">{{ s.tag }}</span>
        <h3>{{ s.icon }} {{ s.name }}</h3>
        {% if lang == 'en' %}
        <p>{{ s.desc_en }}</p>
        {% else %}
        <p>{{ s.desc }}</p>
        {% endif %}
        <div class="ip">▸ {{ s.ip }}</div>
      </div>
    </div>
    {% endfor %}
  </div>
  <div class="carousel-nav" id="carouselNav"></div>
  <button class="carousel-arrow carousel-arrow--prev" id="carouselPrev" aria-label="{{ page.carousel_prev | default: 'Vorheriger' }}">◀</button>
  <button class="carousel-arrow carousel-arrow--next" id="carouselNext" aria-label="{{ page.carousel_next | default: 'Nächster' }}">▶</button>
</div>
