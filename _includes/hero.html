{% assign c = site.data.content[page.lang] %}
{% assign hero = c.hero %}

<section class="hero" id="home">
  <div class="hero-bg-glow"></div>
  <canvas id="particlesCanvas"></canvas>
  <div class="hero-content">
    <div class="hero-badge"><span class="dot"></span> {{ hero.badge }}</div>
    <h1 class="glitch" data-text="{{ hero.title }}">{{ hero.title }}</h1>
    <p class="hero-sub">{{ hero.subtitle }}</p>
    <div class="hero-actions">
      <a href="https://discord.gg/pawsunited" class="btn-neon btn-neon--pink" target="_blank">{{ hero.discord_btn }}</a>
      <a href="#streamers" class="btn-neon btn-neon--cyan">{{ hero.secondary_btn }}</a>
    </div>
  </div>
</section>
